<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetterie - Le Grand Rassemblement</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1942/1942007.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col justify-between relative">
        
        <div id="zone-achat" class="pb-24">
            <div class="w-full bg-black relative">
                <a href="admin.html" class="absolute top-4 right-4 z-20 bg-black/60 hover:bg-black/80 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-sm transition border border-white/20 shadow-md">
                    <i class="fa-solid fa-gear text-lg"></i>
                </a>

                <img src="image.jpeg" alt="Affiche Le Grand Rassemblement" class="w-full h-64 object-cover opacity-90">
                <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black to-transparent p-4 text-white">
                    <span class="bg-amber-500 text-black text-xs font-black uppercase px-2 py-0.5 rounded">En Concert Live</span>
                    <h1 class="text-xl font-black tracking-wide mt-1 text-amber-300">LE GRAND RASSEMBLEMENT</h1>
                    <p class="text-md font-bold text-gray-200">BCHRIST — Psaumes 50v5</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 p-4 bg-emerald-600 text-white text-xs font-semibold text-center shadow-inner">
                <div class="p-2 bg-emerald-700/50 rounded-lg"><i class="fa-solid fa-location-dot text-amber-300 mr-1"></i> MCU Ouakam</div>
                <div class="p-2 bg-emerald-700/50 rounded-lg"><i class="fa-solid fa-clock text-amber-300 mr-1"></i> 17H00</div>
            </div>

            <div class="p-6 space-y-6">
                <h2 class="text-lg font-bold border-b pb-2 text-gray-700"><i class="fa-solid fa-ticket mr-2 text-emerald-600"></i>Réservez vos places</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <label class="border-2 border-gray-200 rounded-2xl p-4 flex flex-col items-center justify-center cursor-pointer hover:border-emerald-500 transition has-[:checked]:border-emerald-600 has-[:checked]:bg-emerald-50/50">
                        <input type="radio" name="ticket_type" value="Standard" checked class="sr-only" onchange="calculerTotal()">
                        <span class="font-bold text-gray-700 text-sm">STANDARD</span>
                        <span class="text-xl font-black text-emerald-600 mt-1">2 000 F</span>
                    </label>
                    <label class="border-2 border-gray-200 rounded-2xl p-4 flex flex-col items-center justify-center cursor-pointer hover:border-emerald-500 transition has-[:checked]:border-emerald-600 has-[:checked]:bg-emerald-50/50">
                        <input type="radio" name="ticket_type" value="VIP" class="sr-only" onchange="calculerTotal()">
                        <span class="font-bold text-gray-700 text-sm">VIP</span>
                        <span class="text-xl font-black text-amber-500 mt-1">5 000 F</span>
                    </label>
                </div>

                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-sm font-semibold text-gray-600">Nombre de billets</span>
                    <div class="flex items-center space-x-4">
                        <button type="button" onclick="modifierQuantite(-1)" class="w-8 h-8 rounded-full bg-gray-200 font-bold flex items-center justify-center">-</button>
                        <span id="quantite" class="text-lg font-bold w-6 text-center">1</span>
                        <button type="button" onclick="modifierQuantite(1)" class="w-8 h-8 rounded-full bg-gray-200 font-bold flex items-center justify-center">+</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Nom complet du participant</label>
                        <input type="text" id="nom" placeholder="Ex: Fatou Diop" class="w-full border p-3 rounded-xl focus:outline-emerald-500 bg-gray-50/50 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Numéro de téléphone WhatsApp</label>
                        <input type="tel" id="telephone" placeholder="Ex: 77XXXXXXX" class="w-full border p-3 rounded-xl focus:outline-emerald-500 bg-gray-50/50 text-sm">
                    </div>
                </div>

                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 bg-amber-50/30 text-center space-y-3">
                    <label class="block text-xs font-bold text-amber-800">
                        <i class="fa-solid fa-wallet mr-1"></i> ÉTAPE 1 : PAIEMENT VIA WAVE
                    </label>
                    <button type="button" onclick="ouvrirWave()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-4 rounded-xl shadow text-xs flex items-center justify-center gap-2 transition">
                        <i class="fa-solid fa-mobile-screen-button text-base"></i> Ouvrir l'application Wave pour payer
                    </button>
                    <p class="text-[11px] text-gray-500 italic">Numéro : <strong class="text-gray-800">77 672 98 54</strong></p>
                    
                    <div class="border-t pt-3 border-amber-200/50">
                        <label class="block text-xs font-bold text-amber-800 mb-2">
                            <i class="fa-solid fa-cloud-arrow-up mr-1"></i> ÉTAPE 2 : Importez la capture d'écran du reçu Wave
                        </label>
                        <input type="file" id="capture_wave" accept="image/*" class="text-xs text-gray-600 block w-full mx-auto file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200">
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-bar" class="fixed bottom-0 max-w-md w-full p-4 border-t bg-white flex justify-between items-center z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div>
                <span class="text-xs text-gray-400 block font-medium">Total à payer</span>
                <span id="total_affichage" class="text-xl font-black text-gray-900">2 000 FCFA</span>
            </div>
            <button id="btn-valider-paiement" onclick="procederAuPaiement()" class="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-bold py-3 px-6 rounded-xl shadow text-sm transition">
                Valider & Recevoir mon QR Billet
            </button>
        </div>
    </div>

    <script>
        let quantite = 1;
        const tarifs = { "Standard": 2000, "VIP": 5000 };
        const NUMERO_RECEPTION = "776729854"; 

        function modifierQuantite(valeur) {
            quantite = Math.max(1, quantite + valeur);
            document.getElementById('quantite').innerText = quantite;
            calculerTotal();
        }

        function calculerTotal() {
            const type = document.querySelector('input[name="ticket_type"]:checked').value;
            const total = tarifs[type] * quantite;
            document.getElementById('total_affichage').innerText = total.toLocaleString('fr-FR') + " FCFA";
            return total;
        }

        function ouvrirWave() {
            const total = calculerTotal();
            // Lien officiel universel Wave (Déclenche le Deep Link sans blocage)
            const urlWave = `https://wave.me/pay?c=ouakam&phone=${NUMERO_RECEPTION}&amount=${total}`;
            window.open(urlWave, '_blank');
        }

        function procederAuPaiement() {
            const nom = document.getElementById('nom').value.trim();
            const tel = document.getElementById('telephone').value.trim();
            const type = document.querySelector('input[name="ticket_type"]:checked').value;
            const fileInput = document.getElementById('capture_wave');
            const total = calculerTotal();

            if (!nom || !tel) {
                alert("⚠️ Veuillez remplir votre nom et votre numéro WhatsApp.");
                return;
            }
            if (fileInput.files.length === 0) {
                alert("⚠️ Veuillez ajouter la photo/capture d'écran de votre reçu Wave.");
                return;
            }

            // Désactivation instantanée du bouton (Anti-spam administrateur)
            const btnValider = document.getElementById('btn-valider-paiement');
            btnValider.disabled = true;
            btnValider.innerText = "Traitement...";

            // Stockage local des statistiques avant redirection
            sauvegarderDansStats(total, quantite);

            const ticketId = "GR-" + Math.floor(100000 + Math.random() * 900000);

            // On stocke temporairement les données pour la page du QR code via localStorage
            localStorage.setItem('temp_ticket_id', ticketId);
            localStorage.setItem('temp_nom', nom);
            localStorage.setItem('temp_tel', tel);
            localStorage.setItem('temp_billet', `${quantite}x ${type}`);
            localStorage.setItem('temp_total', total);

            // Redirection vers l'Écran 2 externe
            window.location.href = "ticket.html";
        }

        function sauvegarderDansStats(montant, qte) {
            let totalArgent = parseInt(localStorage.getItem('stat_argent') || "0");
            let totalTickets = parseInt(localStorage.getItem('stat_tickets') || "0");
            localStorage.setItem('stat_argent', totalArgent + montant);
            localStorage.setItem('stat_tickets', totalTickets + qte);
        }
    </script>
</body>
</html>
