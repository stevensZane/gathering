<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organisateur - Statistiques & Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-900 font-sans text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="login-screen" class="bg-gray-800 p-6 rounded-3xl w-full max-w-sm text-center space-y-4 border border-gray-700 shadow-xl">
        <div class="w-12 h-12 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center mx-auto text-xl">
            <i class="fa-solid fa-lock"></i>
        </div>
        <h3 class="font-black text-lg text-gray-200">Zone Organisateur</h3>
        <input type="password" id="admin-pass" placeholder="Entrez le mot de passe" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:outline-amber-500 text-center text-sm text-white">
        <button onclick="verifierMotDePasse()" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 rounded-xl text-sm transition">
            Se connecter
        </button>
        <a href="index.html" class="text-xs text-gray-400 hover:underline block pt-2">Retour au site public</a>
    </div>

    <div id="dashboard-screen" class="bg-gray-800 rounded-3xl p-6 w-full max-w-sm space-y-4 hidden shadow-xl border border-gray-700">
        <div class="flex justify-between items-center border-b border-gray-700 pb-3">
            <h3 class="font-bold text-md text-gray-200">📊 Panel Organisateur</h3>
            <a href="index.html" class="text-gray-400 hover:text-white text-xs bg-gray-700 px-3 py-1.5 rounded-lg"><i class="fa-solid fa-right-from-bracket mr-1"></i>Quitter</a>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-blue-950/40 p-4 rounded-xl text-center border border-blue-900/50">
                <span class="text-xs text-blue-400 font-bold block">Total Encaissé</span>
                <span id="stat-argent" class="text-xl font-black text-blue-300">0 F</span>
            </div>
            <div class="bg-emerald-950/40 p-4 rounded-xl text-center border border-emerald-900/50">
                <span class="text-xs text-emerald-400 font-bold block">Billets Vendus</span>
                <span id="stat-tickets" class="text-xl font-black text-emerald-300">0</span>
            </div>
        </div>

        <div class="space-y-2 pt-2 border-t border-gray-700">
            <label class="block text-xs font-bold text-gray-400"><i class="fa-solid fa-camera mr-1"></i> Contrôle des billets à l'entrée</label>
            <div id="reader" class="overflow-hidden rounded-xl border border-gray-700 bg-black w-full"></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="demarrerScanner()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2.5 rounded-xl transition"><i class="fa-solid fa-play mr-1"></i> Activer Caméra</button>
                <button onclick="arreterScanner()" class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-bold py-2.5 rounded-xl transition">Arrêter</button>
            </div>
        </div>

        <div id="scan-result" class="p-3 rounded-xl border text-center hidden font-mono text-xs"></div>

        <button onclick="reinitialiserDonnees()" class="w-full text-[10px] text-red-400 hover:underline pt-2 border-t border-gray-700 block text-center">
            <i class="fa-solid fa-trash mr-1"></i> Réinitialiser toutes les données locales
        </button>
    </div>

    <script>
        const CLÉ_ACCÈS_ADMIN = "bchristr2026";
        let html5QrcodeScanner = null;

        function verifierMotDePasse() {
            const saisie = document.getElementById('admin-pass').value;
            if (saisie === CLÉ_ACCÈS_ADMIN) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                chargerDonnees();
            } else {
                alert("❌ Mot de passe incorrect !");
            }
        }

        function chargerDonnees() {
            document.getElementById('stat-argent').innerText = parseInt(localStorage.getItem('stat_argent') || "0").toLocaleString('fr-FR') + " F";
            document.getElementById('stat-tickets').innerText = localStorage.getItem('stat_tickets') || "0";
        }

        function reinitialiserDonnees() {
            if(confirm("Effacer définitivement toutes les statistiques accumulées sur cet appareil ?")) {
                localStorage.removeItem('stat_argent');
                localStorage.removeItem('stat_tickets');
                chargerDonnees();
            }
        }

        function demarrerScanner() {
            const resultBox = document.getElementById('scan-result');
            resultBox.className = "p-3 rounded-xl border text-center hidden font-mono text-xs";
            
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("reader");
            }

            const successCallback = (decodedText) => {
                arreterScanner();
                resultBox.classList.remove('hidden');
                if (decodedText.includes("VALIDE")) {
                    resultBox.className = "p-3 rounded-xl border bg-emerald-950/50 border-emerald-800 text-emerald-300 whitespace-pre-line text-left";
                } else {
                    resultBox.className = "p-3 rounded-xl border bg-red-950/50 border-red-800 text-red-300 whitespace-pre-line text-left";
                }
                resultBox.innerText = decodedText;
            };

            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 220 }, successCallback)
                .catch(err => alert("Erreur de caméra : " + err));
        }

        function arreterScanner() {
            if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
                html5QrcodeScanner.stop().catch(err => console.log(err));
            }
        }
    </script>
</body>
</html>
